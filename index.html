<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mathieu Alassoeur · Contact</title>

  <!--
    Privacy note:
    This page is designed to be public but tries to reduce spam scraping.
    If you WANT search engines to index it, remove the robots meta + robots.txt.
  -->
  <meta name="robots" content="noindex,nofollow" />

  <meta name="description" content="Minimal contact card with quick copy actions." />

  <link rel="icon" type="image/png" href="assets/icons/github.png" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="Contact card">
      <header class="header">
        <div class="title">
          <h1>Mathieu Alassoeur</h1>
          <p class="subtitle">Data Analyst · BI</p>
        </div>
      </header>

      <ul class="links" aria-label="Contact methods">
        <li class="row">
          <img class="icon" src="assets/icons/phone.png" alt="Phone" width="22" height="22" />
          <a id="phoneLink" class="value" href="#" rel="nofollow">Loading…</a>
          <button class="btn" type="button" data-copy="phone" aria-label="Copy phone number">Copy</button>
        </li>

        <li class="row">
          <img class="icon" src="assets/icons/email.png" alt="Email" width="22" height="22" />
          <a id="emailLink" class="value" href="#" rel="nofollow">Loading…</a>
          <button class="btn" type="button" data-copy="email" aria-label="Copy email">Copy</button>
        </li>

        <li class="row">
          <img class="icon" src="assets/icons/linkedin.png" alt="LinkedIn" width="22" height="22" />
          <a class="value" href="https://www.linkedin.com/in/mathieu-alassoeur/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          <span class="spacer"></span>
        </li>

        <li class="row">
          <img class="icon" src="assets/icons/github.png" alt="GitHub" width="22" height="22" />
          <a class="value" href="https://github.com/MatALass" target="_blank" rel="noopener noreferrer">GitHub</a>
          <span class="spacer"></span>
        </li>
      </ul>

      <div class="footer">
        <button class="btn ghost" type="button" id="downloadVcard">Download vCard</button>
        <span class="toast" id="toast" role="status" aria-live="polite"></span>
      </div>

      <!--
        Anti-scrape: store contact info as pieces.
        (Not bulletproof, but reduces naive scraping.)
      -->
      <div hidden>
        <span id="data"
          data-phone-country="+33"
          data-phone-a="6"
          data-phone-b="88"
          data-phone-c="04"
          data-phone-d="55"
          data-phone-e="70"
          data-email-user="mathieu.alassoeur"
          data-email-domain="gmail.com"
        ></span>
      </div>

      <noscript>
        <p class="noscript">
          This page needs JavaScript to display contact details (anti-spam).
        </p>
      </noscript>
    </section>

    <p class="note">
      Tip: enable GitHub Pages (Settings → Pages) to host this as a tiny public landing card.
    </p>
  </main>

  <script src="assets/script.js" defer></script>
</body>
</html>
